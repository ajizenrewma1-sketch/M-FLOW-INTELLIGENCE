<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(79, 70, 229, 0.2); border-radius: 10px; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .notification-border {
            border-color: rgba(249, 115, 22, 0.6);
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.2);
            background: rgba(249, 115, 22, 0.08);
        }

        /* Animation หลักของแถบพลังงาน */
        @keyframes progress-scan {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(200%); opacity: 0; }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 2px currentColor); }
            50% { filter: brightness(1.3) drop-shadow(0 0 8px currentColor); }
        }

        .progress-container {
            background: rgba(30, 41, 59, 0.8);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .progress-bar-smart {
            position: relative;
            overflow: hidden;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse-glow 3s infinite ease-in-out;
        }

        /* แสงวิ่งผ่าน (Cyber Shimmer) */
        .progress-bar-smart::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            animation: progress-scan 2s infinite ease-in-out;
        }

        /* เอฟเฟกต์ลายทาง (Stripes) */
        .progress-bar-smart::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.1) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0.1) 75%,
                transparent 75%,
                transparent
            );
            background-size: 1rem 1rem;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen p-3">
    <!-- Background Decor -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-[-10%] w-[40%] h-[40%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-emerald-600/10 blur-[120px] rounded-full"></div>
    </div>

    <div id="app" class="relative z-10 max-w-full mx-auto">
        <!-- Header -->
        <header class="mb-4">
            <div class="flex flex-wrap items-center justify-between gap-4 bg-slate-900/60 backdrop-blur-2xl p-4 rounded-2xl border border-white/10 shadow-2xl">
                <div class="flex items-center gap-4">
                    <div class="p-2.5 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-xl shadow-lg shadow-indigo-500/20">
                        <i data-lucide="activity" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black bg-gradient-to-r from-white via-slate-200 to-slate-500 bg-clip-text text-transparent tracking-tighter leading-none uppercase">
                            M-FLOW INTELLIGENCE
                        </h1>
                        <div class="flex items-center gap-2 mt-1.5">
                            <span class="flex items-center gap-1.5 text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full border border-emerald-500/20">
                                <span class="relative flex h-2 w-2">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                </span>
                                รีเฟรชอัตโนมัติ: <span id="countdown">30</span> วิ
                            </span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-2" id="input-area">
                    <input 
                        type="text" 
                        id="sheet-input"
                        placeholder="วาง Link Google Sheets ที่นี่..."
                        class="bg-slate-800/80 border border-slate-700 rounded-xl py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 w-64 transition-all placeholder:text-slate-500"
                    >
                    <button 
                        id="refresh-btn"
                        class="bg-white text-slate-900 px-5 py-2 rounded-xl text-sm font-black transition-all hover:bg-indigo-50 active:scale-95 flex items-center gap-2 shadow-lg"
                    >
                        <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                        CONNECT
                    </button>
                    <div id="action-btns" class="hidden flex items-center gap-2">
                        <button 
                            id="instant-refresh-btn"
                            class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-xl transition-all flex items-center gap-2 px-4 text-xs font-bold"
                        >
                            <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                            รีเฟรชข้อมูล
                        </button>
                        <button id="edit-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-xl transition-all border border-white/5">
                            <i data-lucide="settings-2" class="w-5 h-5"></i>
                        </button>
                        <button id="reset-btn" class="bg-slate-800 hover:bg-red-900/40 text-slate-300 hover:text-red-400 p-2 rounded-xl transition-all border border-white/5">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div id="error-box" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 text-red-400 text-xs font-bold animate-pulse">
            <i data-lucide="alert-octagon" class="w-5 h-5"></i>
            <p id="error-msg"></p>
        </div>

        <main>
            <div id="dashboard-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3">
                <!-- Cards will be injected here -->
            </div>
        </main>

        <footer class="mt-6 pt-4 border-t border-white/5 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="flex -space-x-2">
                    <div class="w-6 h-6 rounded-full bg-indigo-600 border-2 border-slate-900 flex items-center justify-center text-[10px] font-bold">M</div>
                    <div class="w-6 h-6 rounded-full bg-emerald-600 border-2 border-slate-900 flex items-center justify-center text-[10px] font-bold">F</div>
                </div>
                <p id="last-refresh-text" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                    SYSTEM READY · STANDBY
                </p>
            </div>
            <div class="text-[10px] font-black text-slate-700 uppercase tracking-[0.3em]">
                Secure Intelligence Protocol v2.5
            </div>
        </footer>
    </div>

    <script>
        let spreadsheetId = '';
        let countdown = 30;
        let timer = null;
        let dashboardData = {};
        let notifications = {};
        let isFetching = false;
        const targetSheets = ["AL อนุมัติผิด", "C", "L", "N", "L ชำระเงินแล้ว", "พินัยM9"];

        function initLucide() {
            lucide.createIcons();
        }

        function extractId(url) {
            const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }

        function isNotEmpty(value) {
            return value !== null && value !== undefined && String(value).trim().length > 0;
        }

        async function fetchSheetData(id, sheetName) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                const cols = jsonData.table.cols;

                let totalCases = 0;
                let completedCases = 0;
                let notifyCount = 0;
                let extra = 0;

                if (sheetName === "AL อนุมัติผิด") {
                    const alprColIndex = cols.findIndex(c => c.label && c.label.includes("ทะเบียนที่ ALPR อนุมัติผิด"));
                    const targetIdx = alprColIndex !== -1 ? alprColIndex : 1; 
                    const inspectorColIdx = 13; 
                    rows.forEach(row => {
                        const cellValue = row.c[targetIdx]?.v;
                        if (isNotEmpty(cellValue)) {
                            totalCases++;
                            if (isNotEmpty(row.c[inspectorColIdx]?.v)) completedCases++;
                        }
                    });
                } 
                else if (sheetName === "C") {
                    const detailColIdx = 5; const opColIdx = 9;
                    rows.forEach((row, index) => {
                        if (index < 2) return;
                        const detailValue = row.c[detailColIdx]?.v;
                        if (isNotEmpty(detailValue)) {
                            totalCases++;
                            if (isNotEmpty(row.c[opColIdx]?.v)) completedCases++;
                            const rowText = row.c.map(cell => String(cell?.v || "").toLowerCase()).join(" ");
                            if (rowText.includes("ข้อมูลเพิ่ม") || rowText.includes("ม่วง")) extra++;
                        }
                    });
                }
                else if (sheetName === "L") {
                    const reporterColIdx = 3; const detailEColIdx = 4; const regColIdx = 5;
                    const infoHColIdx = 7; const openerColIdx = 13;
                    
                    rows.forEach((row, index) => {
                        if (index < 3) return; 
                        const regValue = row.c[regColIdx]?.v;
                        if (isNotEmpty(regValue)) {
                            totalCases++;
                            const reporter = String(row.c[reporterColIdx]?.v || "").toUpperCase();
                            const detailE = String(row.c[detailEColIdx]?.v || "").toUpperCase();
                            const infoH = String(row.c[infoHColIdx]?.v || "");
                            const isQC = reporter.includes("QC");
                            let isSilentCase = false;
                            if (isQC) {
                                if (detailE.startsWith("R6")) {
                                    isSilentCase = !infoH.trim().endsWith("(แก้ไขได้)");
                                } else if (/^(R2|R3|R4|R5|R7|R8|R9|R10|R11)\b/.test(detailE)) {
                                    isSilentCase = true;
                                }
                            }
                            if (isNotEmpty(row.c[openerColIdx]?.v)) {
                                completedCases++;
                            } else if (!isSilentCase) {
                                notifyCount++; 
                            }
                        }
                    });
                }
                else if (sheetName === "L ชำระเงินแล้ว" || sheetName === "N") {
                    const detailColIdx = 5; const openerColIdx = 9; 
                    rows.forEach((row, index) => {
                        if (index < 2) return; 
                        const detailValue = row.c[detailColIdx]?.v;
                        if (isNotEmpty(detailValue)) {
                            totalCases++;
                            if (isNotEmpty(row.c[openerColIdx]?.v)) completedCases++;
                        }
                    });
                }
                else if (sheetName === "พินัยM9") {
                    const detailColIdx = 4; const closedByColIdx = 8;
                    rows.forEach((row, index) => {
                        if (index < 2) return;
                        const detailValue = row.c[detailColIdx]?.v;
                        if (isNotEmpty(detailValue)) {
                            totalCases++;
                            if (isNotEmpty(row.c[closedByColIdx]?.v)) completedCases++;
                        }
                    });
                }
                
                return {
                    total: totalCases,
                    completed: completedCases,
                    notifyCount: notifyCount,
                    extra: extra,
                    lastUpdate: new Date().toLocaleTimeString('th-TH'),
                    error: false
                };
            } catch (err) {
                console.error(err);
                return { total: 0, completed: 0, error: true };
            }
        }

        async function updateDashboard(isAuto = false) {
            if (isFetching) return;
            isFetching = true;

            const idInput = document.getElementById('sheet-input');
            const savedId = localStorage.getItem('mflow_sheet_id');
            const id = spreadsheetId || extractId(idInput.value) || savedId;
            
            if (!id) {
                if (!isAuto) showError("ระบุ Link หรือ ID แผ่นงานเพื่อเริ่มต้นดึงข้อมูล");
                isFetching = false;
                return;
            }

            hideError();
            const refreshIcon = document.getElementById('refresh-icon');
            if (refreshIcon) refreshIcon.classList.add('animate-spin');

            if (!isAuto) {
                const btn = document.getElementById('refresh-btn');
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> SYNCING...';
                initLucide();
            }

            spreadsheetId = id;
            localStorage.setItem('mflow_sheet_id', id);
            
            document.getElementById('sheet-input').classList.add('hidden');
            document.getElementById('refresh-btn').classList.add('hidden');
            document.getElementById('action-btns').classList.remove('hidden');

            const results = {};

            for (const name of targetSheets) {
                const data = await fetchSheetData(id, name);
                notifications[name] = (name === "L") ? (data.notifyCount > 0) : (data.total > data.completed);
                if (data.total === 0 || data.error) notifications[name] = false;
                results[name] = data;
            }

            dashboardData = results;
            renderCards();
            
            document.getElementById('last-refresh-text').innerText = `ซิงค์ข้อมูลแล้ว · ${new Date().toLocaleTimeString('th-TH')}`;
            const mainRefreshBtn = document.getElementById('refresh-btn');
            mainRefreshBtn.disabled = false;
            mainRefreshBtn.innerHTML = '<i data-lucide="zap" class="w-4 h-4 fill-current"></i> CONNECT';
            if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            
            initLucide();
            isFetching = false;
            countdown = 30;
            startTimer();
        }

        function renderCards() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            Object.entries(dashboardData).forEach(([name, data]) => {
                const isNotified = notifications[name];
                const percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
                
                const card = document.createElement('div');
                card.className = `group relative glass-card rounded-2xl border transition-all duration-500 overflow-hidden ${isNotified ? 'notification-border' : 'border-white/5 hover:border-indigo-500/30'}`;
                
                let footerContent = '';
                if (name !== "L" && data.extra > 0) {
                    footerContent = `<span class="bg-indigo-500/10 text-indigo-400 px-1.5 py-0.5 rounded text-[8px]">เพิ่มเติม: ${data.extra}</span>`;
                }

                card.innerHTML = `
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-4">
                            <div class="space-y-1">
                                <p class="text-[9px] font-black uppercase tracking-[0.2em] ${isNotified ? 'text-orange-400' : 'text-indigo-400'}">ส่วนของข้อมูล</p>
                                <h3 class="text-sm font-black text-white truncate max-w-[120px]">${name}</h3>
                            </div>
                            <div class="p-2 rounded-xl ${isNotified ? 'bg-orange-500/20 text-orange-400' : 'bg-slate-800/80 text-slate-500'} transition-colors">
                                <i data-lucide="${isNotified ? 'bell' : 'shield-check'}" class="w-4 h-4 ${isNotified ? 'animate-bounce-slow' : ''}"></i>
                            </div>
                        </div>

                        ${data.error ? 
                            `<div class="py-8 text-center text-slate-600 text-xs font-bold italic tracking-wider">OFFLINE</div>` : 
                            `<div class="space-y-4">
                                <div class="grid grid-cols-2 gap-2.5">
                                    <div class="p-2.5 rounded-xl bg-slate-900/50 border border-white/5 group-hover:bg-slate-900/80 transition-colors">
                                        <p class="text-[11px] font-extrabold text-slate-400 uppercase mb-1">จำนวนเคสทั้งหมด</p>
                                        <p class="text-xl font-black text-white leading-none">${data.total}</p>
                                    </div>
                                    <div class="p-2.5 rounded-xl bg-emerald-500/5 border border-emerald-500/10 text-right">
                                        <p class="text-[11px] font-extrabold text-emerald-600/70 uppercase mb-1">จำนวนเคสที่เสร็จสิ้น</p>
                                        <p class="text-xl font-black text-emerald-400 leading-none">${data.completed}</p>
                                    </div>
                                </div>

                                <div class="space-y-2">
                                    <div class="flex justify-between items-end">
                                        <span class="text-xs font-extrabold text-slate-400 uppercase tracking-wide">เปอร์เซ็นที่สำเร็จ</span>
                                        <span class="text-sm font-black ${isNotified ? 'text-orange-400' : 'text-indigo-400'}">${percent}%</span>
                                    </div>
                                    <div class="h-3 progress-container rounded-full overflow-hidden p-[2px]">
                                        <div 
                                            class="h-full rounded-full progress-bar-smart ${isNotified ? 'bg-gradient-to-r from-orange-600 to-amber-500 text-orange-400' : 'bg-gradient-to-r from-indigo-700 to-indigo-400 text-indigo-400'}" 
                                            style="width: ${percent}%">
                                        </div>
                                    </div>
                                </div>

                                <div class="pt-3 border-t border-white/5 flex items-center justify-between">
                                   <div class="flex items-center gap-1.5 text-[8px] text-slate-600 font-black">
                                     <i data-lucide="clock" class="w-2.5 h-2.5"></i> ${data.lastUpdate}
                                   </div>
                                   ${footerContent}
                                </div>
                            </div>`
                        }
                    </div>
                `;
                grid.appendChild(card);
            });
            initLucide();
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                if (isFetching) return;
                countdown--;
                document.getElementById('countdown').innerText = countdown;
                if (countdown <= 0) updateDashboard(true);
            }, 1000);
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            document.getElementById('error-msg').innerText = msg;
            box.classList.remove('hidden');
            setTimeout(hideError, 5000);
        }

        function hideError() {
            document.getElementById('error-box').classList.add('hidden');
        }

        document.getElementById('refresh-btn').addEventListener('click', () => updateDashboard(false));
        document.getElementById('instant-refresh-btn').addEventListener('click', () => updateDashboard(false));
        
        document.getElementById('edit-btn').addEventListener('click', () => {
            document.getElementById('sheet-input').classList.remove('hidden');
            document.getElementById('refresh-btn').classList.remove('hidden');
            document.getElementById('action-btns').classList.add('hidden');
            if (timer) clearInterval(timer);
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            spreadsheetId = '';
            localStorage.removeItem('mflow_sheet_id');
            dashboardData = {};
            notifications = {};
            if (timer) clearInterval(timer);
            document.getElementById('sheet-input').value = '';
            document.getElementById('sheet-input').classList.remove('hidden');
            document.getElementById('refresh-btn').classList.remove('hidden');
            document.getElementById('action-btns').classList.add('hidden');
            document.getElementById('dashboard-grid').innerHTML = '';
            document.getElementById('last-refresh-text').innerText = 'SYSTEM READY · STANDBY';
            initLucide();
        });

        window.onload = () => { 
            initLucide(); 
            const savedId = localStorage.getItem('mflow_sheet_id');
            if (savedId) {
                spreadsheetId = savedId;
                updateDashboard(true);
            }
        };
    </script>
</body>
</html>
