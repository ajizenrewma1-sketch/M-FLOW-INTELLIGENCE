<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Intelligence Balanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600;800&display=swap');
        
        :root {
            --neon-indigo: #6366f1;
            --neon-orange: #f97316;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%);
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.6);
        }

        /* Animated Running Light Border for Active Alerts */
        .alert-glow {
            position: relative;
            z-index: 1;
            border: 1px solid transparent !important;
            overflow: hidden;
        }

        .alert-glow::before {
            content: '';
            position: absolute;
            z-index: -1;
            left: -50%;
            top: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                transparent, 
                transparent, 
                var(--neon-orange)
            );
            animation: border-glow-flow 4s linear infinite;
        }

        .alert-glow::after {
            content: '';
            position: absolute;
            z-index: -1;
            left: 1px;
            top: 1px;
            width: calc(100% - 2px);
            height: calc(100% - 2px);
            background: rgba(15, 23, 42, 0.95);
            border-radius: 11px;
        }

        @keyframes border-glow-flow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Futuristic Progress Bar */
        .progress-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
            position: relative;
            border-radius: 4px;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: scan 2.5s infinite linear;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .stat-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-card:hover {
            transform: translateY(-2px) scale(1.01);
            background: rgba(30, 41, 59, 0.85);
            border-color: rgba(99, 102, 241, 0.5);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="fixed inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>

    <div id="app" class="relative z-10 p-3 lg:p-4 max-w-[1700px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-3">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-600/30">
                    <i data-lucide="shield" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-orbitron font-black tracking-wider text-white leading-none">M-FLOW <span class="text-indigo-400">INTELLIGENCE</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="flex h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">System Active | Refresh in <span id="countdown" class="text-white">30</span>s</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-2 bg-slate-900/50 p-1.5 rounded-xl border border-white/5" id="controls">
                <div id="config-inputs" class="flex gap-1.5">
                    <input type="text" id="sheet-input-main" placeholder="Main Spreadsheet URL" class="bg-slate-950/60 border border-slate-800 rounded-lg py-1.5 px-3 text-[10px] focus:ring-2 focus:ring-indigo-500 outline-none w-44 transition-all">
                    <input type="text" id="sheet-input-manual" placeholder="Manual Spreadsheet URL" class="bg-slate-950/60 border border-slate-800 rounded-lg py-1.5 px-3 text-[10px] focus:ring-2 focus:ring-indigo-500 outline-none w-44 transition-all">
                </div>
                <button id="refresh-btn" class="bg-white text-indigo-700 hover:bg-indigo-50 px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all flex items-center gap-1.5">
                    <i data-lucide="link" class="w-3.5 h-3.5"></i> CONNECT
                </button>
                <div id="action-btns" class="hidden flex gap-1.5">
                    <button id="instant-refresh-btn" class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg border border-white/10 transition-all">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refresh-icon"></i>
                    </button>
                    <button id="edit-btn" class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg border border-white/10 transition-all">
                        <i data-lucide="settings" class="w-3.5 h-3.5"></i>
                    </button>
                    <button id="reset-btn" class="bg-red-900/20 hover:bg-red-900/40 text-red-400 p-2 rounded-lg border border-red-500/20 transition-all">
                        <i data-lucide="power" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>
        </header>

        <section id="summary-widget" class="hidden grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-2.5 mb-4">
            <div id="summary-main-card" class="glass-panel rounded-xl p-2.5 md:col-span-1 flex flex-row md:flex-col items-center justify-center relative overflow-hidden group gap-2.5">
                <div class="relative w-10 h-10">
                    <svg viewBox="0 0 36 36" class="w-full h-full -rotate-90">
                        <circle cx="18" cy="18" r="16" fill="none" class="stroke-slate-800" stroke-width="4"></circle>
                        <circle id="summary-circle-progress" cx="18" cy="18" r="16" fill="none" class="stroke-indigo-500 transition-all duration-1000" stroke-width="4" stroke-dasharray="0, 100" stroke-linecap="round"></circle>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span id="summary-total-percent" class="text-[9px] font-orbitron font-bold text-white">0%</span>
                    </div>
                </div>
                <h3 class="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-center">สำเร็จ</h3>
            </div>

            <div class="md:col-span-3 lg:col-span-4 grid grid-cols-1 sm:grid-cols-3 gap-2.5">
                <div class="glass-panel rounded-xl p-3 flex justify-between items-center group">
                    <div>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">เคสทั้งหมด</p>
                        <p id="summary-total-cases" class="text-xl font-orbitron font-black text-white leading-none">0</p>
                    </div>
                    <div class="p-1.5 bg-indigo-500/10 rounded-lg group-hover:bg-indigo-500/20 transition-all">
                        <i data-lucide="layers" class="text-indigo-400 w-4 h-4"></i>
                    </div>
                </div>
                <div class="glass-panel rounded-xl p-3 flex justify-between items-center group">
                    <div>
                        <p class="text-[8px] font-bold text-emerald-400 uppercase tracking-widest leading-none mb-1">เคสสำเร็จ</p>
                        <p id="summary-total-done" class="text-xl font-orbitron font-black text-emerald-400 leading-none">0</p>
                    </div>
                    <div class="p-1.5 bg-emerald-500/10 rounded-lg group-hover:bg-emerald-500/20 transition-all">
                        <i data-lucide="check-circle" class="text-emerald-400 w-4 h-4"></i>
                    </div>
                </div>
                <div id="alert-summary-card" class="glass-panel rounded-xl p-3 flex justify-between items-center relative overflow-hidden group">
                    <div id="alpr-alert-container" class="hidden absolute top-1 right-1">
                        <span class="flex h-1.5 w-1.5">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-orange-500"></span>
                        </span>
                    </div>
                    <div class="relative z-10">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">การแจ้งเตือนชีทที่ซ่อน</p>
                        <p id="alert-status-text" class="text-[9px] font-bold text-slate-500 mt-0.5 uppercase truncate max-w-[100px]">Operational</p>
                    </div>
                    <div class="p-1.5 bg-slate-500/10 rounded-lg group-hover:bg-slate-500/20 transition-all relative z-10">
                        <i data-lucide="activity" class="text-slate-400 w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </section>

        <main id="dashboard-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3"></main>
    </div>

    <script>
        let countdown = 30;
        let timer = null;
        let isFetching = false;
        
        const visibleMainSheets = ["C", "L", "N", "L ชำระเงินแล้ว", "พินัยM9"];
        const hiddenMainSheets = ["AL อนุมัติผิด"];
        const manualSheetName = "Transaction Manual";

        function initLucide() { lucide.createIcons(); }
        function extractId(url) {
            if (!url) return '';
            const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }

        async function fetchMainSheetData(id, sheetName) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                let total = 0, completed = 0, notify = 0;
                let alertRows = [];
                const isNotEmpty = (v) => v !== null && v !== undefined && String(v).trim() !== '';

                if (sheetName === "AL อนุมัติผิด") {
                    rows.forEach((r, idx) => { if(r.c && isNotEmpty(r.c[3]?.v)) { total++; if(isNotEmpty(r.c[13]?.v)) completed++; else { notify++; alertRows.push(idx + 1); } }});
                } else if (sheetName === "L") {
                    rows.slice(3).forEach((r, idx) => { 
                        if(r.c && isNotEmpty(r.c[5]?.v)) { // เช็คหลักที่คอลัมน์ F (Index 5)
                            total++; 
                            const isDone = isNotEmpty(r.c[13]?.v); // คอลัมน์ N (Index 13)
                            
                            if (isDone) {
                                completed++;
                            } else {
                                // Logic ตรวจสอบการแจ้งเตือนเพิ่มเติม
                                const colD = String(r.c[3]?.v || "").toUpperCase(); // Index 3
                                const colE = String(r.c[4]?.v || "").toUpperCase(); // Index 4
                                const colH = String(r.c[7]?.v || ""); // Index 7
                                
                                let shouldNotify = true;

                                if (colD.includes("QC")) {
                                    if (colE.startsWith("R6")) {
                                        // Case R6: แจ้งเตือนเฉพาะที่มีคำว่า "แก้ไข" ใน H
                                        shouldNotify = colH.includes("แก้ไข");
                                    } else if (["R2","R3","R4","R5","R7","R8","R9","R10","R11"].some(rx => colE.startsWith(rx))) {
                                        // Case R2-R11 (ยกเว้น R6): ไม่ต้องแจ้งเตือน
                                        shouldNotify = false;
                                    }
                                }

                                if (shouldNotify) {
                                    notify++;
                                    alertRows.push(idx + 4);
                                }
                            }
                        }
                    });
                } else if (["C", "N", "L ชำระเงินแล้ว"].includes(sheetName)) {
                    rows.slice(2).forEach(r => { if(isNotEmpty(r.c[5]?.v)) { total++; if(isNotEmpty(r.c[9]?.v)) completed++; else notify++; }});
                } else if (sheetName === "พินัยM9") {
                    rows.slice(2).forEach(r => { if(isNotEmpty(r.c[4]?.v)) { total++; if(isNotEmpty(r.c[8]?.v)) completed++; else notify++; }});
                }
                return { total, completed, notify, alertRows, error: false };
            } catch (e) { return { total: 0, completed: 0, notify: 0, alertRows: [], error: true }; }
        }

        async function fetchManualData(id) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(manualSheetName)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                let total = 0, completed = 0, alert = false, alertRows = [];
                const targetTypes = ["ตรวจสอบรายการผ่านทาง", "ตรวจสอบการผ่านทางที่ได้รับการยกเว้น", "ตรวจสอบรายการผ่านทางอนุมัติผ่านทางพิเศษ"];

                rows.forEach((row, idx) => {
                    if (!row || !row.c || !row.c[7]?.v) return;
                    const colI = String(row.c[8]?.v || "");
                    if (colI.startsWith("เตรียมข้อมูล")) return;
                    total++;
                    const colL = String(row.c[11]?.v || "");
                    const colR = row.c[17]?.v;
                    const isTarget = targetTypes.some(t => colI.includes(t));
                    const isDone = colR || colL === "สร้างTXNเท่านั้น" || colL === "-" || (isTarget && colL === "แก้ไขจาก RCF");
                    if (isDone) completed++;
                    else if (isTarget && !colI.includes("ผิดกฎหมาย")) { alert = true; alertRows.push(idx + 1); }
                });
                return { total, completed, notify: alert, alertRows, error: false };
            } catch (e) { return { total: 0, completed: 0, notify: false, alertRows: [], error: true }; }
        }

        async function updateDashboard() {
            if (isFetching) return;
            isFetching = true;
            const mId = extractId(document.getElementById('sheet-input-main').value) || localStorage.getItem('mf_m');
            const manId = extractId(document.getElementById('sheet-input-manual').value) || localStorage.getItem('mf_man');
            
            if (!mId) { isFetching = false; return; }
            localStorage.setItem('mf_m', mId);
            if (manId) localStorage.setItem('mf_man', manId);

            document.getElementById('config-inputs').classList.add('hidden');
            document.getElementById('refresh-btn').classList.add('hidden');
            document.getElementById('action-btns').classList.remove('hidden');
            document.getElementById('summary-widget').classList.remove('hidden');
            document.getElementById('refresh-icon').classList.add('animate-spin');

            let totalAll = 0, doneAll = 0, alprAlert = false;
            const results = [];

            const alpr = await fetchMainSheetData(mId, "AL อนุมัติผิด");
            totalAll += alpr.total; doneAll += alpr.completed;
            if (alpr.notify > 0) alprAlert = true;

            if (manId) {
                const man = await fetchManualData(manId);
                results.push({ name: 'Log Manual', ...man, isManual: true });
                totalAll += man.total; doneAll += man.completed;
            }

            for (const name of visibleMainSheets) {
                const data = await fetchMainSheetData(mId, name);
                results.push({ name, ...data, isL: name === "L" });
                totalAll += data.total; doneAll += data.completed;
            }

            renderDashboard(results);
            updateSummary(totalAll, doneAll, alprAlert);
            
            document.getElementById('refresh-icon').classList.remove('animate-spin');
            isFetching = false;
            countdown = 30;
            startTimer();
        }

        function updateSummary(total, done, alpr) {
            const p = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('summary-total-cases').innerText = total.toLocaleString();
            document.getElementById('summary-total-done').innerText = done.toLocaleString();
            document.getElementById('summary-total-percent').innerText = p + '%';
            document.getElementById('summary-circle-progress').setAttribute('stroke-dasharray', `${p}, 100`);
            
            const alprContainer = document.getElementById('alpr-alert-container');
            const alertSummaryCard = document.getElementById('alert-summary-card');
            const alertStatusText = document.getElementById('alert-status-text');

            alprContainer.classList.toggle('hidden', !alpr);
            alertSummaryCard.classList.toggle('alert-glow', alpr);
            
            // อัปเดตข้อความตามเงื่อนไขที่ผู้ใช้ต้องการ
            if (alpr) {
                alertStatusText.innerText = 'ALPR ACTION';
                alertStatusText.className = 'text-[9px] font-bold mt-0.5 uppercase text-orange-500';
            } else {
                alertStatusText.innerText = 'AL ไม่มีเคสใหม่';
                alertStatusText.className = 'text-[9px] font-bold mt-0.5 uppercase text-slate-500';
            }
        }

        function renderDashboard(data) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const p = item.total > 0 ? Math.round((item.completed / item.total) * 100) : 0;
                const isAlert = item.notify > 0 || item.notify === true;
                const card = document.createElement('div');
                card.className = `stat-card glass-panel rounded-xl p-3.5 border-l-4 ${isAlert ? 'alert-glow' : 'border-l-indigo-500'}`;
                
                card.innerHTML = `
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-2.5">
                            <div class="overflow-hidden">
                                <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mb-0.5">SHEET ${item.isL ? '<span class="text-indigo-400 ml-1">SMART FILTER</span>' : ''}</p>
                                <h3 class="text-[11px] font-orbitron font-bold text-white uppercase truncate pr-2">${item.name}</h3>
                            </div>
                            <div class="p-1.5 rounded-lg ${isAlert ? 'bg-orange-500/15 text-orange-400' : 'bg-slate-800/60 text-slate-500'}">
                                <i data-lucide="${isAlert ? 'alert-octagon' : 'database'}" class="w-3.5 h-3.5"></i>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <p class="text-[8px] font-bold text-slate-500 uppercase leading-none mb-1.5">เคสทั้งหมด</p>
                                <p class="text-base font-orbitron font-black text-white leading-none">${item.total.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-bold text-emerald-500/80 uppercase leading-none mb-1.5">เคสที่สำเร็จ</p>
                                <p class="text-base font-orbitron font-black text-emerald-400 leading-none">${item.completed.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex justify-between text-[9px] font-bold">
                                <span class="text-slate-500 uppercase tracking-tight">ความคืบหน้า</span>
                                <span class="${isAlert ? 'text-orange-400' : 'text-indigo-400'}">${p}%</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-fill ${isAlert ? 'bg-gradient-to-r from-orange-600 to-amber-400' : 'bg-gradient-to-r from-indigo-600 to-blue-500'}" style="width: ${p}%"></div>
                            </div>
                        </div>

                        ${(item.isManual || item.isL) && isAlert ? `
                            <div class="mt-3 pt-1.5 border-t border-white/5">
                                <p class="text-[8px] font-bold text-orange-300 italic">Rows to Check: ${item.alertRows.slice(0,5).join(', ')}${item.alertRows.length > 5 ? '...' : ''}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            initLucide();
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                countdown--;
                if(document.getElementById('countdown')) document.getElementById('countdown').innerText = countdown;
                if (countdown <= 0) updateDashboard();
            }, 1000);
        }

        document.getElementById('refresh-btn').onclick = updateDashboard;
        document.getElementById('instant-refresh-btn').onclick = updateDashboard;
        document.getElementById('reset-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('edit-btn').onclick = () => {
            document.getElementById('config-inputs').classList.remove('hidden');
            document.getElementById('refresh-btn').classList.remove('hidden');
            document.getElementById('action-btns').classList.add('hidden');
            clearInterval(timer);
        };

        window.onload = () => {
            const m = localStorage.getItem('mf_m');
            if (m) {
                document.getElementById('sheet-input-main').value = m;
                document.getElementById('sheet-input-manual').value = localStorage.getItem('mf_man') || '';
                updateDashboard();
            }
            initLucide();
        };
    </script>
</body>
</html>
