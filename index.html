<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(79, 70, 229, 0.2); border-radius: 10px; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.5);
        }

        .notification-border {
            border-color: rgba(249, 115, 22, 0.6);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.15);
            background: rgba(249, 115, 22, 0.08);
        }

        .summary-circle-path {
            transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes shine-sweep {
            0% { transform: translateX(-200%); }
            100% { transform: translateX(200%); }
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .progress-bar-premium {
            position: relative;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: inherit;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .progress-bar-premium::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0.06) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.06) 50%,
                rgba(255, 255, 255, 0.06) 75%,
                transparent 75%,
                transparent
            );
            background-size: 30px 30px;
            z-index: 1;
        }

        .progress-bar-premium::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            animation: shine-sweep 4s infinite linear;
            z-index: 2;
        }

        .glossy-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
            z-index: 3;
            border-radius: inherit;
        }

        .glow-indigo { box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
        .glow-orange { box-shadow: 0 0 12px rgba(249, 115, 22, 0.3); }

        .animate-bounce-slow { animation: bounce-slow 2s infinite; }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen p-2">
    <!-- Background Decor -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-[-10%] w-[30%] h-[30%] bg-indigo-600/5 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[25%] h-[25%] bg-emerald-600/5 blur-[100px] rounded-full"></div>
    </div>

    <div id="app" class="relative z-10 max-w-full mx-auto">
        <header class="mb-2 space-y-2">
            <div class="flex flex-wrap items-center justify-between gap-2 bg-slate-900/60 backdrop-blur-2xl p-2 rounded-xl border border-white/10 shadow-xl">
                <div class="flex items-center gap-2.5">
                    <div class="p-1.5 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-lg shadow-md">
                        <i data-lucide="activity" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-base font-black bg-gradient-to-r from-white via-slate-200 to-slate-500 bg-clip-text text-transparent tracking-tighter uppercase italic leading-none">
                            M-FLOW INTELLIGENCE
                        </h1>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="flex items-center gap-1 text-[8px] font-bold text-emerald-400 bg-emerald-500/10 px-1 py-0.5 rounded-full border border-emerald-500/10">
                                <span class="relative flex h-1 w-1">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-1 w-1 bg-emerald-500"></span>
                                </span>
                                AUTO REFRESH: <span id="countdown" class="font-black">30</span>S
                            </span>
                        </div>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-1.5" id="input-area">
                    <div id="config-inputs" class="flex flex-col gap-1">
                        <input type="text" id="sheet-input-main" placeholder="URL Google Sheets (Main)" class="bg-slate-800/80 border border-slate-700 rounded-lg py-1 px-2 text-[10px] focus:outline-none focus:ring-1 focus:ring-indigo-500/50 w-56 transition-all placeholder:text-slate-500">
                        <input type="text" id="sheet-input-manual" placeholder="URL Google Sheets (Log Manual)" class="bg-slate-800/80 border border-slate-700 rounded-lg py-1 px-2 text-[10px] focus:outline-none focus:ring-1 focus:ring-indigo-500/50 w-56 transition-all placeholder:text-slate-500">
                    </div>
                    <button id="refresh-btn" class="bg-white text-slate-900 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-indigo-50 flex items-center gap-1.5 shadow-md">
                        <i data-lucide="zap" class="w-3 h-3 fill-current"></i>
                        CONNECT
                    </button>
                    <div id="action-btns" class="hidden flex items-center gap-1">
                        <button id="instant-refresh-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white p-1.5 rounded-lg transition-all flex items-center gap-1.5 px-3 text-[10px] font-bold">
                            <i data-lucide="refresh-cw" class="w-3 h-3" id="refresh-icon"></i>
                            รีเฟรช
                        </button>
                        <button id="edit-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 p-1.5 rounded-lg border border-white/5 transition-colors">
                            <i data-lucide="settings-2" class="w-3 h-3"></i>
                        </button>
                        <button id="reset-btn" class="bg-slate-800 hover:bg-red-900/40 text-slate-300 hover:text-red-400 p-1.5 rounded-lg border border-white/5 transition-colors">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="summary-widget" class="hidden glass-card rounded-xl border border-white/10 p-2 shadow-xl flex flex-col sm:flex-row items-center gap-3 overflow-hidden">
                <div class="flex items-center gap-3 border-b sm:border-b-0 sm:border-r border-white/10 pb-2 sm:pb-0 sm:pr-3">
                    <div class="relative w-11 h-11">
                        <svg viewBox="0 0 36 36" class="w-full h-full -rotate-90">
                            <circle cx="18" cy="18" r="15.9155" fill="none" class="text-slate-800" stroke-width="3" stroke="currentColor" />
                            <path id="summary-circle-progress" class="summary-circle-path text-indigo-500" stroke-width="3" stroke-dasharray="0, 100" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="summary-total-percent" class="text-[10px] font-black text-white leading-none">0%</span>
                        </div>
                    </div>
                    <div class="min-w-fit">
                        <h2 class="text-[10px] font-black text-white uppercase italic tracking-tight leading-none">สรุปภาพรวม</h2>
                        <div id="alpr-alert-container" class="flex items-center gap-1 mt-1 hidden">
                           <span class="flex h-1 w-1">
                                <span class="animate-ping absolute inline-flex h-1.5 w-1.5 rounded-full bg-orange-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-1 w-1 bg-orange-500"></span>
                           </span>
                           <span class="text-[10px] font-black text-orange-400 uppercase italic animate-pulse-soft leading-none">มีเคสใหม่ ALPR</span>
                        </div>
                        <p id="performance-label" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest leading-none mt-1">Performance</p>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-3 gap-1 w-full">
                    <div class="flex flex-col justify-center px-2">
                        <div class="flex items-center gap-1 mb-0.5 text-slate-500">
                            <i data-lucide="layers" class="w-2 h-2"></i>
                            <span class="text-[8px] font-black uppercase tracking-widest leading-none">ทั้งหมด</span>
                        </div>
                        <p id="summary-total-cases" class="text-xl font-black text-white tracking-tighter leading-none">0</p>
                    </div>
                    <div class="flex flex-col justify-center border-l border-white/5 px-2">
                        <div class="flex items-center gap-1 mb-0.5 text-emerald-500">
                            <i data-lucide="check-circle" class="w-2 h-2"></i>
                            <span class="text-[8px] font-black uppercase tracking-widest leading-none">เสร็จ</span>
                        </div>
                        <p id="summary-total-done" class="text-xl font-black text-emerald-400 tracking-tighter leading-none">0</p>
                    </div>
                    <div class="flex flex-col justify-center border-l border-white/5 px-2">
                        <div class="flex items-center gap-1 mb-0.5 text-indigo-400">
                            <i data-lucide="trending-up" class="w-2 h-2"></i>
                            <span class="text-[8px] font-black uppercase tracking-widest leading-none">อัตรา</span>
                        </div>
                        <p id="summary-total-percent-text" class="text-xl font-black text-indigo-400 tracking-tighter leading-none">0%</p>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div id="dashboard-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-2"></div>
        </main>

        <footer class="mt-3 pt-2 border-t border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <p id="last-refresh-text" class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">STATUS: IDLE</p>
            </div>
            <div class="text-[8px] font-black text-slate-700 uppercase tracking-[0.3em]">Shield v3.1.1</div>
        </footer>
    </div>

    <script>
        let mainSpreadsheetId = '';
        let manualSpreadsheetId = '';
        let countdown = 30;
        let timer = null;
        let dashboardData = {};
        let notifications = {};
        let isFetching = false;

        const visibleMainSheets = ["C", "L", "N", "L ชำระเงินแล้ว", "พินัยM9"];
        const hiddenMainSheets = ["AL อนุมัติผิด"]; 
        const manualSheetName = "Transaction Manual";

        function initLucide() { lucide.createIcons(); }
        
        function extractId(url) {
            if (!url) return '';
            const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }

        function isNotEmpty(value) {
            return value !== null && value !== undefined && String(value).trim().length > 0;
        }

        async function fetchManualData(id) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(manualSheetName)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                
                let totalCases = 0, completedCases = 0, hasNewAlert = false;
                let alertRows = [];
                const targetTypes = ["ตรวจสอบรายการผ่านทาง", "ตรวจสอบการผ่านทางที่ได้รับการยกเว้น", "ตรวจสอบรายการผ่านทางอนุมัติผ่านทางพิเศษ"];

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || !row.c) continue;
                    const colH = row.c[7]?.v;
                    const colI = String(row.c[8]?.v || "").trim();
                    const colL = String(row.c[11]?.v || "").trim();
                    const colR = row.c[17]?.v;
                    if (!isNotEmpty(colH)) continue;
                    if (colI.startsWith("เตรียมข้อมูล")) continue;
                    totalCases++;
                    const isTargetType = targetTypes.some(type => colI.includes(type));
                    let isDone = isNotEmpty(colR) || colL === "สร้างTXNเท่านั้น" || colL === "-" || (isTargetType && colL === "แก้ไขจาก RCF");
                    if (isDone) completedCases++;
                    if (!colI.includes("ตรวจสอบการผ่านทางที่ผิดกฎหมาย") && !isDone && isTargetType) {
                        hasNewAlert = true;
                        alertRows.push(i + 1);
                    }
                }
                return { total: totalCases, completed: completedCases, notify: hasNewAlert, alertRows: alertRows, error: false };
            } catch (err) {
                return { total: 0, completed: 0, notify: false, error: true };
            }
        }

        async function fetchMainSheetData(id, sheetName) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                let totalCases = 0, completedCases = 0, notifyCount = 0, extra = 0;

                if (sheetName === "AL อนุมัติผิด") {
                    rows.forEach((row) => {
                        if (row.c && isNotEmpty(row.c[3]?.v)) {
                            totalCases++;
                            if (isNotEmpty(row.c[13]?.v)) {
                                completedCases++;
                            } else {
                                notifyCount++; 
                            }
                        }
                    });
                } else if (sheetName === "L") {
                    const reporterColIdx = 3, detailEColIdx = 4, regColIdx = 5, infoHColIdx = 7, openerColIdx = 13;
                    rows.forEach((row, index) => {
                        if (index < 3) return; 
                        const regValue = row.c[regColIdx]?.v;
                        if (isNotEmpty(regValue)) {
                            totalCases++;
                            const reporter = String(row.c[reporterColIdx]?.v || "").toUpperCase();
                            const detailE = String(row.c[detailEColIdx]?.v || "").toUpperCase();
                            const infoH = String(row.c[infoHColIdx]?.v || "");
                            const isDone = isNotEmpty(row.c[openerColIdx]?.v);
                            
                            if (isDone) {
                                completedCases++;
                            } else {
                                if (reporter === "QC" && detailE.startsWith("R6")) {
                                    if (infoH.includes("แก้ไข")) {
                                        notifyCount++;
                                    }
                                } else {
                                    notifyCount++;
                                }
                            }
                        }
                    });
                } else if (sheetName === "C" || sheetName === "L ชำระเงินแล้ว" || sheetName === "N") {
                    const detailIdx = 5, opIdx = 9;
                    rows.forEach((row, index) => {
                        if (index < 2) return;
                        if (isNotEmpty(row.c[detailIdx]?.v)) {
                            totalCases++;
                            if (isNotEmpty(row.c[opIdx]?.v)) completedCases++;
                            else notifyCount++; 
                            if (sheetName === "C") {
                                const txt = row.c.map(c => String(c?.v || "").toLowerCase()).join(" ");
                                if (txt.includes("ข้อมูลเพิ่ม") || txt.includes("ม่วง")) extra++;
                            }
                        }
                    });
                } else if (sheetName === "พินัยM9") {
                    const detailIdx = 4, closedIdx = 8;
                    rows.forEach((row, index) => {
                        if (index < 2) return;
                        if (isNotEmpty(row.c[detailIdx]?.v)) {
                            totalCases++;
                            if (isNotEmpty(row.c[closedIdx]?.v)) completedCases++;
                            else notifyCount++; 
                        }
                    });
                }
                return { total: totalCases, completed: completedCases, notifyCount: notifyCount, extra: extra, error: false };
            } catch (err) { return { total: 0, completed: 0, error: true }; }
        }

        async function updateDashboard(isAuto = false) {
            if (isFetching) return;
            isFetching = true;
            
            const mainInput = document.getElementById('sheet-input-main');
            const manualInput = document.getElementById('sheet-input-manual');
            const mId = extractId(mainInput.value) || localStorage.getItem('mflow_main_id');
            const manId = extractId(manualInput.value) || localStorage.getItem('mflow_manual_id');
            
            if (!mId) { isFetching = false; return; }
            
            const refreshIcon = document.getElementById('refresh-icon');
            if (refreshIcon) refreshIcon.classList.add('animate-spin');
            
            localStorage.setItem('mflow_main_id', mId);
            if (manId) localStorage.setItem('mflow_manual_id', manId);
            
            document.getElementById('config-inputs').classList.add('hidden');
            document.getElementById('refresh-btn').classList.add('hidden');
            document.getElementById('action-btns').classList.remove('hidden');
            document.getElementById('summary-widget').classList.remove('hidden');
            
            const results = {};
            let totalOverall = 0, completedOverall = 0, alprNotify = false;
            const orderedVisibleSheets = [];
            
            for (const name of hiddenMainSheets) {
                const data = await fetchMainSheetData(mId, name);
                results[name] = data;
                if (!data.error) { 
                    totalOverall += data.total; 
                    completedOverall += data.completed;
                    if (name === "AL อนุมัติผิด" && data.notifyCount > 0) alprNotify = true;
                }
            }
            
            if (manId) {
                const manData = await fetchManualData(manId);
                results["Log Manual"] = manData;
                notifications["Log Manual"] = manData.notify; 
                if (!manData.error) { totalOverall += manData.total; completedOverall += manData.completed; }
                orderedVisibleSheets.push("Log Manual");
            }
            
            for (const name of visibleMainSheets) {
                const data = await fetchMainSheetData(mId, name);
                notifications[name] = data.notifyCount > 0;
                if (data.total === 0 || data.error) notifications[name] = false;
                results[name] = data;
                if (!data.error) { totalOverall += data.total; completedOverall += data.completed; }
                orderedVisibleSheets.push(name);
            }
            
            dashboardData = { order: orderedVisibleSheets, data: results };
            updateSummaryWidget(totalOverall, completedOverall, alprNotify);
            renderCards();
            
            document.getElementById('last-refresh-text').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
            if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            initLucide();
            isFetching = false;
            countdown = 30;
            startTimer();
        }

        function updateSummaryWidget(total, done, showAlprAlert) {
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('summary-total-cases').innerText = total.toLocaleString();
            document.getElementById('summary-total-done').innerText = done.toLocaleString();
            document.getElementById('summary-total-percent-text').innerText = percent + '%';
            document.getElementById('summary-total-percent').innerText = percent + '%';
            document.getElementById('summary-circle-progress').setAttribute('stroke-dasharray', `${percent}, 100`);
            
            const alprContainer = document.getElementById('alpr-alert-container');
            const performanceLabel = document.getElementById('performance-label');
            if (showAlprAlert) {
                alprContainer.classList.remove('hidden');
                performanceLabel.classList.add('hidden');
            } else {
                alprContainer.classList.add('hidden');
                performanceLabel.classList.remove('hidden');
            }
        }

        function renderCards() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            dashboardData.order.forEach((name) => {
                const data = dashboardData.data[name];
                const isNotified = notifications[name];
                const percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
                const card = document.createElement('div');
                card.className = `glass-card rounded-xl border transition-all duration-300 overflow-hidden ${isNotified ? 'notification-border' : 'border-white/5 hover:border-indigo-500/30'}`;
                
                let footer = '';
                if (name === "Log Manual" && isNotified) {
                    footer = `<span class="bg-orange-500/10 text-orange-300 px-1 py-0.5 rounded text-[9px] font-black tracking-tighter">แถวที่: ${data.alertRows.join(', ')}</span>`;
                } else if (name !== "L" && data.extra > 0) {
                    footer = `<span class="bg-indigo-500/10 text-indigo-400 px-1 py-0.5 rounded text-[8px] font-bold italic">ADD: ${data.extra}</span>`;
                }
                
                card.innerHTML = `
                    <div class="p-2">
                        <div class="flex justify-between items-start mb-2">
                            <div class="space-y-0">
                                <p class="text-[8px] font-extrabold uppercase tracking-widest ${isNotified ? 'text-orange-400/90' : 'text-indigo-400/90'}">SOURCE</p>
                                <h3 class="text-[11px] font-black text-white truncate max-w-[100px] uppercase italic leading-none">${name}</h3>
                            </div>
                            <div class="p-1 rounded-lg ${isNotified ? 'bg-orange-500/20 text-orange-400' : 'bg-slate-800/80 text-slate-500'} shadow-sm">
                                <i data-lucide="${isNotified ? 'bell' : 'shield-check'}" class="w-3 h-3 ${isNotified ? 'animate-bounce-slow' : ''}"></i>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-1.5 mb-2">
                            <div class="p-1.5 rounded-lg bg-slate-950/40 border border-white/5">
                                <p class="text-[8px] font-extrabold text-slate-500 uppercase mb-0.5 leading-none">TOTAL</p>
                                <p class="text-base font-black text-white leading-none tracking-tight">${data.total}</p>
                            </div>
                            <div class="p-1.5 rounded-lg bg-emerald-500/5 border border-emerald-500/10 text-right">
                                <p class="text-[8px] font-extrabold text-emerald-600/70 uppercase mb-0.5 leading-none">DONE</p>
                                <p class="text-base font-black text-emerald-400 leading-none tracking-tight">${data.completed}</p>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-end px-0.5">
                                <span class="text-[8px] font-extrabold text-slate-500 uppercase tracking-widest leading-none">SUCCESS</span>
                                <span class="text-[10px] font-black ${isNotified ? 'text-orange-400' : 'text-indigo-400'} italic tracking-tighter leading-none">${percent}%</span>
                            </div>
                            <div class="h-2 progress-container rounded-full">
                                <div class="h-full rounded-full progress-bar-premium bg-gradient-to-r ${isNotified ? 'from-orange-600 to-amber-400 glow-orange' : 'from-indigo-600 to-blue-500 glow-indigo'}" style="width: ${percent}%">
                                    <div class="glossy-top"></div>
                                </div>
                            </div>
                        </div>
                        <div class="pt-1.5 border-t border-white/5 flex items-center justify-end min-h-[20px] mt-1.5">${footer}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            initLucide();
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                if (isFetching) return;
                countdown--;
                if (document.getElementById('countdown')) document.getElementById('countdown').innerText = countdown;
                if (countdown <= 0) updateDashboard(true);
            }, 1000);
        }

        document.getElementById('refresh-btn').addEventListener('click', () => updateDashboard(false));
        document.getElementById('instant-refresh-btn').addEventListener('click', () => updateDashboard(false));
        document.getElementById('edit-btn').addEventListener('click', () => {
            document.getElementById('config-inputs').classList.remove('hidden');
            document.getElementById('refresh-btn').classList.remove('hidden');
            document.getElementById('action-btns').classList.add('hidden');
            clearInterval(timer);
        });
        document.getElementById('reset-btn').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });

        window.onload = () => { 
            initLucide(); 
            const savedMain = localStorage.getItem('mflow_main_id');
            if (savedMain) {
                document.getElementById('sheet-input-main').value = savedMain;
                document.getElementById('sheet-input-manual').value = localStorage.getItem('mflow_manual_id') || '';
                updateDashboard(true);
            }
        };
    </script>
</body>
</html>
